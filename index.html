<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Double Cypher</title>
  <style>
    body {
      font-family: monospace;
      max-width: 560px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f2f2f2;
      color: #222;
    }

    h1 {
      font-size: 1.3em;
      margin-bottom: 6px;
    }

    .instructions {
      font-size: 0.88em;
      color: #444;
      margin: 4px 0 18px;
    }

    label {
      font-size: 0.88em;
      display: block;
      margin-bottom: 4px;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      background: #ddd;
      border: 1px solid #bbb;
      padding: 6px;
      font-family: monospace;
      font-size: 0.82em;
      resize: none;
    }

    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #bbb;
      padding: 6px;
      font-family: monospace;
      font-size: 0.88em;
      margin-bottom: 10px;
    }

    .section {
      margin-bottom: 14px;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    button {
      padding: 5px 16px;
      font-size: 0.88em;
      cursor: pointer;
    }

    #feedback {
      margin-top: 12px;
      font-size: 0.92em;
      font-weight: bold;
      min-height: 1.2em;
    }

    #feedback.correct {
      color: green;
    }

    #feedback.wrong {
      color: crimson;
    }
  </style>
</head>

<body>

  <h1>Double Cypher Challenge</h1>
  <p class="instructions">
    The message below has been encoded in two layers: first <strong>hvmte</strong>, then
    <strong>utlxlbqmryhnk</strong>.<br>
    Reverse both layers and enter the original plaintext.
    looks like the directions got scrambled :/
  </p>

  <div class="section">
    <label for="encoded">Encoded message (read only):</label>
    <textarea id="encoded" rows="4" readonly></textarea>
  </div>

  <div class="section">
    <label for="answer">Your decoded message:</label>
    <input type="text" id="answer" placeholder="Enter plaintext here...">
    <div class="buttons">
      <button id="submitBtn">Submit</button>
      <button id="clearBtn">Clear</button>
    </div>
  </div>

  <div id="feedback" role="status" aria-live="polite"></div>

  <script>
    // Encoding pipeline:
    //   plaintext -> octal (space-separated 3-digit codes) -> base64
    // Validation:
    //   SHA-256(user input) compared to SHA-256(plaintext) — plaintext never stored directly.

    (async () => {
      const plaintext = "certainty is the great enemy of unity";

      // Step 1: octal-encode each character (3-digit, zero-padded, space-separated)
      const octalStr = plaintext
        .split('')
        .map(c => c.charCodeAt(0).toString(8).padStart(3, '0'))
        .join(' ');

      // Step 2: base64-encode the octal string
      document.getElementById('encoded').value = btoa(octalStr);

      // Hash the plaintext; only the hash is kept for comparison
      const encode = s => new TextEncoder().encode(s);
      const toHex = buf => Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, '0')).join('');

      const secretHash = toHex(await crypto.subtle.digest('SHA-256', encode(plaintext)));

      async function checkAnswer() {
        const input = document.getElementById('answer').value.trim().toLowerCase();
        const fb = document.getElementById('feedback');
        if (!input) {fb.textContent = ''; fb.className = ''; return;}

        const inputHash = toHex(await crypto.subtle.digest('SHA-256', encode(input)));
        if (inputHash === secretHash) {
          fb.textContent = '✓ Correct! Well decoded.';
          fb.className = 'correct';
        } else {
          fb.textContent = '✗ Incorrect. Try again.';
          fb.className = 'wrong';
        }
      }

      function clearInput() {
        document.getElementById('answer').value = '';
        const fb = document.getElementById('feedback');
        fb.textContent = '';
        fb.className = '';
      }

      document.getElementById('submitBtn').addEventListener('click', checkAnswer);
      document.getElementById('clearBtn').addEventListener('click', clearInput);
      document.getElementById('answer').addEventListener('keydown', e => {
        if (e.key === 'Enter') checkAnswer();
      });
    })();
  </script>
</body>

</html>

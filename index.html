<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Double Cypher</title>
  <style>
    body {
      font-family: monospace;
      max-width: 560px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f2f2f2;
      color: #222;
    }

    h1 {
      font-size: 1.3em;
      margin-bottom: 6px;
    }

    .instructions {
      font-size: 0.88em;
      color: #444;
      margin: 4px 0 18px;
    }

    label {
      font-size: 0.88em;
      display: block;
      margin-bottom: 4px;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      background: #ddd;
      border: 1px solid #bbb;
      padding: 6px;
      font-family: monospace;
      font-size: 0.82em;
      resize: none;
    }

    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #bbb;
      padding: 6px;
      font-family: monospace;
      font-size: 0.88em;
      margin-bottom: 10px;
    }

    .section {
      margin-bottom: 14px;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    button {
      padding: 5px 16px;
      font-size: 0.88em;
      cursor: pointer;
    }

    #feedback {
      margin-top: 12px;
      font-size: 0.92em;
      font-weight: bold;
      min-height: 1.2em;
    }

    #feedback.correct {
      color: green;
    }

    #feedback.wrong {
      color: crimson;
    }
  </style>
</head>

<body>

  <h1>Double Cypher Challenge</h1>
  <p class="instructions">
    The message below has been encoded in two layers:
    <strong>utlxlbqmryhnk</strong> & <strong>hvmte</strong>. <br>
    Reverse both layers and enter the original plaintext.
    looks like the directions got scrambled :/
  </p>

  <div class="section">
    <label for="encoded">Encoded message (read only):</label>
    <textarea id="encoded" rows="4" readonly></textarea>
  </div>

  <div class="section">
    <label for="answer">Your decoded message:</label>
    <input type="text" id="answer" placeholder="Enter plaintext here...">
    <div class="buttons">
      <button id="submitBtn">Submit</button>
      <button id="clearBtn">Clear</button>
    </div>
  </div>

  <div id="feedback" role="status" aria-live="polite"></div>

  <script>
    const encodedMessage = "MTQzIDE0NSAxNjIgMTY0IDE0MSAxNTEgMTU2IDE2NCAxNzEgMDQwIDE1MSAxNjMgMDQwIDE2NCAxNTAgMTQ1IDA0MCAxNDcgMTYyIDE0NSAxNDEgMTY0IDA0MCAxNDUgMTU2IDE0NSAxNTUgMTcxIDA0MCAxNTcgMTQ2IDA0MCAxNjUgMTU2IDE1MSAxNjQgMTcx";
    const secretHash = "d2a88c5dedf070aede9fb2c4af67d906f5b67db4a0b0ca50f1f94b500de0f88f";

    document.getElementById('encoded').value = encodedMessage;

    const encode = s => new TextEncoder().encode(s);
    const toHex = buf => Array.from(new Uint8Array(buf))
      .map(b => b.toString(16).padStart(2, '0')).join('');

    async function checkAnswer() {
      const input = document.getElementById('answer').value.trim().toLowerCase();
      const fb = document.getElementById('feedback');
      if (!input) {fb.textContent = ''; fb.className = ''; return;}

      const inputHash = toHex(await crypto.subtle.digest('SHA-256', encode(input)));
      if (inputHash === secretHash) {
        fb.textContent = '✓ Correct! Well decoded.';
        fb.className = 'correct';
      } else {
        fb.textContent = '✗ Incorrect. Try again.';
        fb.className = 'wrong';
      }
    }

    function clearInput() {
      document.getElementById('answer').value = '';
      const fb = document.getElementById('feedback');
      fb.textContent = '';
      fb.className = '';
    }

    document.getElementById('submitBtn').addEventListener('click', checkAnswer);
    document.getElementById('clearBtn').addEventListener('click', clearInput);
    document.getElementById('answer').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkAnswer();
    });
  </script>
</body>

</html>
